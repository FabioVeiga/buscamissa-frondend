<header class="bm-header">
  <div class="bm-header__inner">

    <!-- Logo -->
    <a routerLink="/home" [queryParams]="{}" class="bm-header__logo">
      <!-- width/height intrínsecos (73x71) reservam o espaço antes do download (anti-CLS) -->
      <img src="assets/logo.png" alt="Busca Missa" width="73" height="71" class="h-8 w-auto" />
      <span class="bm-header__brand">Busca Missa</span>
    </a>

    <!-- Desktop nav -->
    <nav class="bm-header__nav">
      <a routerLink="/home" routerLinkActive="bm-header__link--ativo"
         [routerLinkActiveOptions]="{exact: true}" class="bm-header__link">Início</a>
      <a routerLink="/missa-agora" routerLinkActive="bm-header__link--ativo" class="bm-header__link bm-header__link--live">
        <span class="bm-header__dot"></span> Missa agora
      </a>
      <a routerLink="/como-funciona" routerLinkActive="bm-header__link--ativo" class="bm-header__link">Como funciona</a>
      <a routerLink="/minhas-igrejas" routerLinkActive="bm-header__link--ativo" class="bm-header__link bm-header__link--favoritos">
        <i class="pi pi-heart-fill"></i> Meus favoritos
        <span class="bm-header__contador" *ngIf="favoritosCount > 0">{{ favoritosCount }}</span>
      </a>
      <a routerLink="/nova" routerLinkActive="bm-header__link--ativo" class="bm-header__link">Cadastrar igreja</a>
      <a *ngIf="estaLogado" routerLink="/meu-painel" routerLinkActive="bm-header__link--ativo" class="bm-header__link">
        <i class="pi pi-verified"></i> Meu painel
        <span class="bm-header__contador" *ngIf="notificacoesNaoLidas > 0">{{ notificacoesNaoLidas }}</span>
      </a>
    </nav>

    <!-- Hamburger (mobile) -->
    <button class="bm-header__hamburger" (click)="menuAberto = !menuAberto" aria-label="Menu">
      <i class="pi" [ngClass]="menuAberto ? 'pi-times' : 'pi-bars'"></i>
    </button>

  </div>

  <!-- Mobile dropdown -->
  <nav *ngIf="menuAberto" class="bm-header__mobile" (click)="menuAberto = false">
    <a routerLink="/home" class="bm-header__mobile-link">Início</a>
    <a routerLink="/missa-agora" class="bm-header__mobile-link bm-header__mobile-link--live">
      <span class="bm-header__dot"></span> Missa agora
    </a>
    <a routerLink="/como-funciona" class="bm-header__mobile-link">Como funciona</a>
    <a routerLink="/minhas-igrejas" class="bm-header__mobile-link bm-header__mobile-link--fav">
      <i class="pi pi-heart-fill"></i> Meus favoritos
      <span class="bm-header__contador" *ngIf="favoritosCount > 0">{{ favoritosCount }}</span>
    </a>
    <a routerLink="/nova" class="bm-header__mobile-link bm-header__mobile-link--cta">Cadastrar igreja</a>
    <a *ngIf="estaLogado" routerLink="/meu-painel" class="bm-header__mobile-link">
      <i class="pi pi-verified"></i> Meu painel
      <span class="bm-header__contador" *ngIf="notificacoesNaoLidas > 0">{{ notificacoesNaoLidas }}</span>
    </a>
  </nav>
</header>
