<app-loading *ngIf="isLoading" />
<div class="hero">
  <h1 class="title"></h1>
  <p></p>
</div>
<div class="auth-container text-center">
  <p-toast position="top-right"></p-toast>

  <!-- Validação por desafio matemático -->
  <form *ngIf="mostrarDesafio === true" [formGroup]="formDesafio">
    <div class="flex flex-col items-center">
      <h3>Confirmação rápida</h3>
      <p class="text-muted-color block mb-8">
        Para confirmar sua contribuição, responda a pergunta abaixo:
      </p>
      <p class="text-xl font-semibold mb-4">{{ perguntaDesafio }}</p>
      <p-inputnumber
        formControlName="resposta"
        inputId="resposta-desafio"
        [useGrouping]="false"
        placeholder="Sua resposta"
      />
      <div class="flex justify-between mt-8 self-stretch">
        <p-button
          label="Nova pergunta"
          [link]="true"
          class="p-0"
          (click)="carregarDesafio()"
        />
        <p-button label="Confirmar" (click)="validarDesafio()" />
      </div>
    </div>
  </form>

  <!-- Validação por código enviado por e-mail (fluxo original) -->
  <form *ngIf="mostrarDesafio === false" [formGroup]="form">
    <div class="flex flex-col items-center">
      <h3>Confirmação de usuário</h3>
      <p class="text-muted-color block mb-8">
        Foi enviado para <strong>{{ email }}</strong> um código de confirmação,
        por favor, insira o código recebido abaixo. <br />
        Caso não tenha recebido o código, verifique sua caixa de spam.
      </p>
      <p-inputotp
        formControlName="codigoValidador"
        [length]="6"
        [integerOnly]="true"
      />
      <div class="flex justify-between mt-8 self-stretch">
        <p-button
          label="Reenviar código"
          [link]="true"
          class="p-0"
          (click)="resendCode()"
        />
        <p-button label="Confirmar código" (click)="validateCode()" />
      </div>
    </div>
  </form>
</div>
