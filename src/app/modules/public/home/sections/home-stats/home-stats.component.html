<section class="stats" aria-label="O Busca Missa em números">
  <p class="stats__caption"><i class="pi pi-heart-fill"></i> Mantido pela comunidade católica — informações atualizadas continuamente</p>
  <div class="stats__item">
    <span class="stats__icon stats__icon--orange"><i class="pi pi-home"></i></span>
    <span class="stats__num">{{ fmt(stats.igrejas) }}+</span>
    <span class="stats__label">igrejas cadastradas</span>
  </div>
  <div class="stats__item">
    <span class="stats__icon stats__icon--green"><i class="pi pi-clock"></i></span>
    <span class="stats__num">{{ fmt(stats.horarios) }}+</span>
    <span class="stats__label">horários cadastrados</span>
  </div>
  <div class="stats__item">
    <span class="stats__icon stats__icon--blue"><i class="pi pi-map-marker"></i></span>
    <span class="stats__num">{{ stats.cidades }}+</span>
    <span class="stats__label">cidades atendidas</span>
  </div>
  <div class="stats__item">
    <span class="stats__icon stats__icon--purple"><i class="pi pi-map"></i></span>
    <span class="stats__num">{{ stats.estados }}</span>
    <span class="stats__label">estados brasileiros</span>
  </div>
</section>
