<div class="mt-4 rounded-xl border border-green-200 bg-green-50 px-5 py-4
            flex flex-col sm:flex-row sm:items-center gap-4">
  <div class="flex items-start gap-3 flex-1">
    <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center shrink-0">
      <i class="pi pi-check-circle text-green-600"></i>
    </div>
    <div>
      <p class="text-sm font-semibold text-green-800">Os horários estão corretos?</p>
      <p class="text-xs text-green-700/70 mt-0.5">Ajude a comunidade a manter as informações atualizadas.</p>
    </div>
  </div>
  <div class="shrink-0 flex flex-col items-center gap-1">
    <button pButton
      [icon]="confirmacaoEnviada || jaConfirmou() ? 'pi pi-check' : 'pi pi-thumbs-up'"
      [label]="confirmacaoEnviada || jaConfirmou() ? 'Confirmado!' : 'Confirmar horários'"
      [disabled]="confirmacaoEnviada || jaConfirmou() || confirmandoHorarios"
      [loading]="confirmandoHorarios"
      class="p-button-success"
      (click)="confirmarHorarios()">
    </button>
    <p *ngIf="ultimaConfirmacao" class="text-xs text-green-700/60">
      Última confirmação: {{ ultimaConfirmacaoLabel }}
    </p>
  </div>
</div>
