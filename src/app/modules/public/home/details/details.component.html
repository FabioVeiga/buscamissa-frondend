<p-toast></p-toast>

<div class="paroquia-page max-w-5xl mx-auto px-3 sm:px-4 pb-10">

  <!-- Skeleton -->
  <div *ngIf="isLoading" class="flex flex-col gap-4 pt-4">
    <p-skeleton height="8rem" borderRadius="14px"></p-skeleton>
    <p-skeleton height="9rem" borderRadius="16px"></p-skeleton>
    <p-skeleton height="2rem" width="50%"></p-skeleton>
    <p-skeleton height="1rem" *ngFor="let i of [1,2,3,4]" width="80%"></p-skeleton>
  </div>

  <ng-container *ngIf="!isLoading && churchInfo">

    <!-- Breadcrumb -->
    <nav aria-label="Breadcrumb"
         class="flex items-center flex-wrap gap-1 text-xs text-gray-400 pt-4 pb-3">
      <a routerLink="/home" class="hover:text-primary">Início</a>
      <span>›</span>
      <a [routerLink]="linkCidade()" class="hover:text-primary">
        {{ churchInfo.endereco?.localidade }}<span *ngIf="churchInfo.endereco?.uf">/{{ churchInfo.endereco.uf }}</span>
      </a>
      <span>›</span>
      <span class="text-gray-600 font-medium truncate">{{ churchInfo.nome }}</span>
    </nav>

    <!-- ══ HEADER CLEAN (largura total) ══ -->
    <app-details-header
      [igreja]="churchInfo"
      [proximaMissa]="proximaMissa"
      [isFavorita]="isFavorita"
      (compartilharClick)="compartilhar()"
      (favoritarClick)="toggleFavorita()"
      (direcoesClick)="trackDirections()"
    />

    <!-- ══ SCOREBOARD (largura total) ══ -->
    <app-details-scoreboard
      [proximaMissa]="proximaMissa"
      (verTodas)="scrollToHorarios()"
    />

    <!-- HORÁRIOS (largura total) -->
    <app-details-horarios
      [missas]="churchInfo.missas ?? []"
      (adicionarHorarios)="reportarErro()"
    />

    <!-- CONFIRMAR (largura total) -->
    <app-details-confirmar
      *ngIf="churchInfo.missas?.length"
      [igrejaId]="churchInfo.id"
      [igrejaNome]="churchInfo.nome"
    />

    <!-- ══ GRID DUAS COLUNAS: Como chegar (esquerda) | Informações da comunidade (direita) ══ -->
    <div class="page-grid mt-6">

      <!-- ── Coluna principal ── -->
      <div class="min-w-0">
        <app-details-como-chegar
          [igreja]="churchInfo"
          (direcoesClick)="trackDirections()"
        />
      </div>

      <!-- ── Sidebar ── -->
      <aside class="flex flex-col gap-4">
        <app-details-contato
          [igreja]="churchInfo"
          [tiposRedeSocial]="tiposRedeSocial"
          (objetivoClick)="trackObjetivoAlcancado($event)"
          (telefoneClick)="trackCliqueTelefone()"
          (socialClick)="trackSocialClick($event)"
          (adicionarInformacoes)="abrirModalReportarProblema()"
        />
      </aside>
    </div>

    <!-- ══ REPORTAR (largura total) ══ -->
    <section class="mt-6 rounded-xl bg-surface-50 border border-surface-100 px-4 py-3
                    flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
      <div class="flex items-start gap-2">
        <i class="pi pi-exclamation-triangle text-gray-400 mt-0.5"></i>
        <div>
          <p class="text-sm font-medium text-gray-700">Horário incorreto ou desatualizado?</p>
          <p class="text-xs text-gray-400">Nos ajude a manter as informações corretas para toda a comunidade.</p>
        </div>
      </div>
      <div class="flex gap-2 shrink-0">
        <button pButton type="button" icon="pi pi-pencil" label="Realizar alteração"
          class="p-button-outlined p-button-secondary p-button-sm"
          (click)="reportarErro()">
        </button>
        <button pButton type="button" icon="pi pi-flag" label="Reportar problema"
          class="p-button-outlined p-button-danger p-button-sm"
          (click)="abrirModalReportarProblema()">
        </button>
      </div>
    </section>

    <!-- ══ MODAL REPORTAR PROBLEMA ══ -->
    <app-details-reportar-modal
      [(visible)]="modalReportarProblemaVisible"
      [igrejaId]="churchInfo.id"
      [igrejaNome]="churchInfo.nome"
      (irParaAlterar)="reportarErro()"
    />

    <!-- Voltar -->
    <div class="mt-4">
      <button pButton type="button" icon="pi pi-arrow-left" label="Voltar"
        class="p-button-text text-primary" (click)="voltar()"></button>
    </div>

  </ng-container>
</div>
