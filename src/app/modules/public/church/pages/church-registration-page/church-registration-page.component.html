<div class="px-1 pt-3 pb-1">
  <a routerLink="/home"
     class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-primary transition-colors">
    <i class="pi pi-arrow-left text-xs"></i> Página inicial
  </a>
</div>
<div class="pt-2">
  <p-toast />
  <p-confirmDialog></p-confirmDialog>
  <p-progressBar
    mode="indeterminate"
    *ngIf="isLoading"
    [style]="{ height: '6px' }"
  ></p-progressBar>

  <div *ngIf="isCepLoading" class="text-center mt-5">
    <p-progressBar mode="indeterminate"></p-progressBar>
    <p>Procurando informações do CEP...</p>
  </div>

  <p-panel header="Formulário de Cadastro" class="mb-4" *ngIf="!isCepLoading">
    <app-church-form
      [isSaving]="isLoading"
      [isEditMode]="false"
      (formSubmit)="handleFormSubmit($event)"
      (formCancel)="cancel()"
      (cepLookup)="handleCepLookup($event)"
    >
    </app-church-form>
  </p-panel>
</div>
